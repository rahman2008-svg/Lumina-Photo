workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Grant Gradle Permission
        script: |
          chmod +x gradlew || true

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt
